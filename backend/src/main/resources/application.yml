server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: test-platform
  
  datasource:
    url: jdbc:postgresql://localhost:5434/test_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  redis:
    host: localhost
    port: 16379
    password:
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: FrostsTestPlatformSecretKey2024VeryLongAndSecure
  expiration: 86400000

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
