server:
  port: 9080
  servlet:
    context-path: /api

spring:
  application:
    name: test-platform
  
  datasource:
    url: jdbc:postgresql://localhost:5434/test_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  data:
    redis:
      host: localhost
      port: 16379
      password:
  
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 5MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  mail:
    host: smtp.example.com
    port: 587
    username: noreply@frosts.com
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: FrostsTestPlatformSecretKey2024VeryLongAndSecure
  expiration: 7200000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  security:
    alert:
      email-enabled: true
      ban-threshold: 20
  file:
    upload-dir: ./uploads
    avatar-dir: ./uploads/avatars
  mfa:
    issuer: FrostS
    encryption-key: ${MFA_ENCRYPTION_KEY:defaultMfaEncryptionKey2024}
