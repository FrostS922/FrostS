input {
  file {
    path => "/app/logs/security.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_security"
    codec => "plain"
    tags => ["security"]
  }
}

filter {
  if "security" in [tags] {
    grok {
      match => { "message" => [
        "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:logger} - \[TOKEN_REFRESH_WARN\] 用户 %{DATA:username} 在1分钟内刷新Token %{NUMBER:refresh_count:int} 次, 客户端IP: %{DATA:client_ip}",
        "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:logger} - \[TOKEN_REFRESH_ALERT\] 用户 %{DATA:username} 在1分钟内刷新Token %{NUMBER:refresh_count:int} 次, 客户端IP: %{DATA:client_ip}",
        "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:logger} - \[TOKEN_REFRESH_BAN\] 用户 %{DATA:username} 在1分钟内刷新Token %{NUMBER:refresh_count:int} 次, 客户端IP: %{DATA:client_ip}, 触发自动封禁",
        "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:logger} - \[TOKEN_REFRESH_BLOCKED\] 用户 %{DATA:username} 因频繁刷新已被临时封禁, 客户端IP: %{DATA:client_ip}",
        "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:logger} - \[TOKEN_REFRESH_SUMMARY\] 用户 %{DATA:username} 过去1分钟共刷新 %{NUMBER:refresh_count:int} 次",
        "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:logger} - \[SECURITY_ALERT\] Sending token abuse alert for user: %{DATA:username}, count: %{NUMBER:refresh_count:int}, ip: %{DATA:client_ip}",
        "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:logger} - \[SECURITY_BAN\] Auto-banning user %{DATA:username} for excessive token refresh \(%{NUMBER:refresh_count:int} times/min, IP: %{DATA:client_ip}\)"
      ] }
      overwrite => [ "message" ]
    }

    if [message] =~ "TOKEN_REFRESH_WARN" {
      mutate { add_field => { "alert_level" => "WARN" } }
    } else if [message] =~ "TOKEN_REFRESH_ALERT" {
      mutate { add_field => { "alert_level" => "ALERT" } }
    } else if [message] =~ "TOKEN_REFRESH_BAN" {
      mutate { add_field => { "alert_level" => "BAN" } }
    } else if [message] =~ "TOKEN_REFRESH_BLOCKED" {
      mutate { add_field => { "alert_level" => "BLOCKED" } }
    }

    mutate {
      add_field => { "log_type" => "token_security" }
    }

    date {
      match => [ "timestamp", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
    }
  }
}

output {
  if "security" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "frosts-security-%{+YYYY.MM.dd}"
    }
  }
}
